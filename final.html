<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="images/ZUiY.gif" alt="stars" class="star">
    <img src="images/5l03.gif" alt="ballon" class="ballon">
    <div class="container">
        <div class="birthdayCard">
            <div class="cardFront">
                <div class="front-text">
                    <h3 class="happy">HAPPY</h3>
                    <h2 class="bday">BIRTHDAY</h2>
                    <h3 class="toyou">to you!</h3>
                </div>
                <div class="wrap-deco">
                    <div class="decorations"></div>
                    <div class="decorationsTwo"></div>
                </div>
                <div class="wrap-decoTwo">
                    <div class="decorations"></div>
                    <div class="decorationsThree"></div>
                </div>
                <div class="plate">
                    <div class="cake"></div>
                    <div class="flame"></div>
                </div>
            </div>
            <div class="cardInside">
                <div class="img">
                    <img src="images/Cat.png" alt="Brotherpic" class="bdyboy">
                    <img src="images/6ob.gif" alt="confetti" class="confetti">
                </div>
                <div class="inside-text">
                    <h3 class="happy">HAPPY</h3>
                    <h2 class="bday">BIRTHDAY</h2>
                    <h3 class="toyou">to you!</h3>
                </div>
                <div class="wishes">
                    <p>Dear Thơ,</p>
                    <p>Happy birthday!! Chúc em sinh nhật vui vẻ, ăn mau chóng lớn là luôn hạnh phúc với mọi điều em nhận
                        được cũng như
                        style của bản thân nhennn.</p>
                        <p class="name">Minh</p>
                    </div>
            </div>
        </div>
    </div>

    <img src="images/4SHX.gif" alt="cat" class="cat">


</body></html>
